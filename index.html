<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZinzinBot - Collection des Cartes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(180deg, #1a0a2e 0%, #0d0d0d 100%);
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f39c12, #e74c3c, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            color: #888;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
        }

        .stat-box .number {
            font-size: 2rem;
            font-weight: 700;
            color: #f39c12;
        }

        .stat-box .label {
            font-size: 0.85rem;
            color: #888;
        }

        /* ── Filtres ── */
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 24px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            background: transparent;
            color: #ccc;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: rgba(255,255,255,0.4);
            color: #fff;
        }

        .filter-btn.active {
            background: #f39c12;
            border-color: #f39c12;
            color: #000;
        }

        /* ── Sections ── */
        .rarity-section {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .rarity-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .rarity-badge {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .rarity-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .rarity-info {
            font-size: 0.85rem;
            color: #888;
            margin-left: auto;
        }

        /* ── Grille de cartes ── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes chromatic {
            0%   { border-color: #ff0000; box-shadow: 0 0 15px #ff000040, inset 0 0 15px #ff000015; }
            16%  { border-color: #ff8800; box-shadow: 0 0 15px #ff880040, inset 0 0 15px #ff880015; }
            33%  { border-color: #ffff00; box-shadow: 0 0 15px #ffff0040, inset 0 0 15px #ffff0015; }
            50%  { border-color: #00ff88; box-shadow: 0 0 15px #00ff8840, inset 0 0 15px #00ff8815; }
            66%  { border-color: #0088ff; box-shadow: 0 0 15px #0088ff40, inset 0 0 15px #0088ff15; }
            83%  { border-color: #8800ff; box-shadow: 0 0 15px #8800ff40, inset 0 0 15px #8800ff15; }
            100% { border-color: #ff0000; box-shadow: 0 0 15px #ff000040, inset 0 0 15px #ff000015; }
        }

        @keyframes chromatic-text {
            0%   { color: #ff0000; }
            16%  { color: #ff8800; }
            33%  { color: #ffff00; }
            50%  { color: #00ff88; }
            66%  { color: #0088ff; }
            83%  { color: #8800ff; }
            100% { color: #ff0000; }
        }

        .card.mythique {
            border-color: #ff0000;
            animation: chromatic 4s linear infinite;
        }
        .card.mythique:hover {
            transform: translateY(-5px);
            animation: chromatic 2s linear infinite;
        }
        .card.legendaire { border-color: #E07B00; }
        .card.legendaire:hover { box-shadow: 0 10px 30px rgba(224,123,0,0.4); }
        .card.epique { border-color: #8E44AD; }
        .card.epique:hover { box-shadow: 0 10px 30px rgba(142,68,173,0.4); }
        .card.rare { border-color: #27AE60; }
        .card.rare:hover { box-shadow: 0 10px 30px rgba(39,174,96,0.4); }
        .card.commune { border-color: #5DADE2; }
        .card.commune:hover { box-shadow: 0 10px 30px rgba(93,173,226,0.4); }

        .card-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: #111;
        }

        .card-info {
            padding: 12px 15px;
        }

        .card-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .card-rarity {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card.mythique .card-rarity { animation: chromatic-text 4s linear infinite; }
        .card.mythique .card-name { animation: chromatic-text 4s linear infinite; }
        .card.legendaire .card-rarity { color: #E07B00; }
        .card.epique .card-rarity { color: #8E44AD; }
        .card.rare .card-rarity { color: #27AE60; }
        .card.commune .card-rarity { color: #5DADE2; }

        .card-chance {
            font-size: 0.8rem;
            color: #666;
            margin-top: 4px;
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a1a;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }

        .modal-info {
            padding: 25px;
            text-align: center;
        }

        .modal-info h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .modal-info .modal-rarity {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .modal-info .modal-chance {
            font-size: 1rem;
            color: #888;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            z-index: 1001;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #444;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .footer a {
            color: #f39c12;
            text-decoration: none;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .header h1 { font-size: 2rem; }
            .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stats { gap: 15px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>ZinzinBot</h1>
    <p>Collection complète des cartes Minecraft</p>
    <div class="stats">
        <div class="stat-box">
            <div class="number">38</div>
            <div class="label">Cartes au total</div>
        </div>
        <div class="stat-box">
            <div class="number">5</div>
            <div class="label">Raretés</div>
        </div>
        <div class="stat-box">
            <div class="number">3/jour</div>
            <div class="label">Pack quotidien</div>
        </div>
    </div>
</div>

<div class="filters">
    <button class="filter-btn active" onclick="filterCards('all')">Toutes</button>
    <button class="filter-btn" onclick="filterCards('commune')">Commune</button>
    <button class="filter-btn" onclick="filterCards('rare')">Rare</button>
    <button class="filter-btn" onclick="filterCards('epique')">Épique</button>
    <button class="filter-btn" onclick="filterCards('legendaire')">Légendaire</button>
    <button class="filter-btn" onclick="filterCards('mythique')">Mythique</button>
</div>

<div id="cards-container"></div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <button class="modal-close" onclick="closeModal(event)">&times;</button>
    <div class="modal">
        <img id="modal-img" src="" alt="">
        <div class="modal-info">
            <div class="modal-rarity" id="modal-rarity"></div>
            <h3 id="modal-name"></h3>
            <div class="modal-chance" id="modal-chance"></div>
        </div>
    </div>
</div>

<div class="footer">
    <p>ZinzinBot &copy; 2025 &mdash; Bot Discord de collection de cartes Minecraft</p>
</div>

<script>
const CARDS = [
    // Mythique
    { id: "enderman", name: "Enderman", rarity: "Mythique", chance: 0.10, color: "#2D0057", image: "images/Enderman.png", css: "mythique" },

    // Légendaires
    { id: "warden", name: "Warden", rarity: "Légendaire", chance: 0.50, color: "#E07B00", image: "images/Warden.png", css: "legendaire" },
    { id: "grand_gardien", name: "Grand Gardien", rarity: "Légendaire", chance: 0.50, color: "#E07B00", image: "images/Elder.png", css: "legendaire" },
    { id: "evocateur", name: "Évocateur", rarity: "Légendaire", chance: 0.50, color: "#E07B00", image: "images/Evoker.png", css: "legendaire" },
    { id: "poulpe_luisant", name: "Poulpe Luisant", rarity: "Légendaire", chance: 0.50, color: "#E07B00", image: "images/glowsquid.png", css: "legendaire" },

    // Épiques
    { id: "sorciere", name: "Sorcière", rarity: "Épique", chance: 1.20, color: "#8E44AD", image: "images/Sorciere.png", css: "epique" },
    { id: "blaze", name: "Blaze", rarity: "Épique", chance: 1.20, color: "#8E44AD", image: "images/Blaze.png", css: "epique" },
    { id: "breeze", name: "Breeze", rarity: "Épique", chance: 1.20, color: "#8E44AD", image: "images/Breeze.png", css: "epique" },
    { id: "cheval_zombie", name: "Cheval Zombie", rarity: "Épique", chance: 1.20, color: "#8E44AD", image: "images/ChevalZombie.png", css: "epique" },
    { id: "grinceur", name: "Grinceur", rarity: "Épique", chance: 1.20, color: "#8E44AD", image: "images/Creaking.png", css: "epique" },
    { id: "creeper", name: "Creeper", rarity: "Épique", chance: 1.20, color: "#8E44AD", image: "images/Creeper.png", css: "epique" },
    { id: "golem_fer", name: "Golem de Fer", rarity: "Épique", chance: 1.20, color: "#8E44AD", image: "images/Golem.png", css: "epique" },
    { id: "piglin_barbare", name: "Piglin Barbare", rarity: "Épique", chance: 1.20, color: "#8E44AD", image: "images/PiglinBrut.png", css: "epique" },
    { id: "pillard", name: "Pillard", rarity: "Épique", chance: 1.20, color: "#8E44AD", image: "images/Pillager.png", css: "epique" },
    { id: "ravageur", name: "Ravageur", rarity: "Épique", chance: 1.20, color: "#8E44AD", image: "images/Rabager.png", css: "epique" },
    { id: "champimeuh", name: "Champimeuh", rarity: "Épique", chance: 1.20, color: "#8E44AD", image: "images/VacheChampi.png", css: "epique" },
    { id: "strider", name: "Strider", rarity: "Épique", chance: 1.20, color: "#8E44AD", image: "images/Strider.png", css: "epique" },

    // Rares
    { id: "tatou", name: "Tatou", rarity: "Rare", chance: 2.50, color: "#27AE60", image: "images/Tatou.png", css: "rare" },
    { id: "vindicateur", name: "Vindicateur", rarity: "Rare", chance: 2.50, color: "#27AE60", image: "images/Vindicator.png", css: "rare" },
    { id: "abeille", name: "Abeille", rarity: "Rare", chance: 2.50, color: "#27AE60", image: "images/Abeille.png", css: "rare" },
    { id: "golem_cuivre", name: "Golem de Cuivre", rarity: "Rare", chance: 2.50, color: "#27AE60", image: "images/GolemCuivre.png", css: "rare" },
    { id: "ocelot", name: "Ocelot", rarity: "Rare", chance: 2.50, color: "#27AE60", image: "images/Ocelot.png", css: "rare" },
    { id: "ours_polaire", name: "Ours Polaire", rarity: "Rare", chance: 2.50, color: "#27AE60", image: "images/OursPolaire.png", css: "rare" },
    { id: "panda", name: "Panda", rarity: "Rare", chance: 2.50, color: "#27AE60", image: "images/Pandat.png", css: "rare" },
    { id: "piglin", name: "Piglin", rarity: "Rare", chance: 2.50, color: "#27AE60", image: "images/Piglin.png", css: "rare" },
    { id: "poulpe", name: "Poulpe", rarity: "Rare", chance: 2.50, color: "#27AE60", image: "images/Poulpe.png", css: "rare" },
    { id: "renard", name: "Renard", rarity: "Rare", chance: 2.50, color: "#27AE60", image: "images/Renard.png", css: "rare" },

    // Communes
    { id: "vache", name: "Vache", rarity: "Commune", chance: 5.85, color: "#5DADE2", image: "images/vache.png", css: "commune" },
    { id: "ane", name: "Âne", rarity: "Commune", chance: 5.85, color: "#5DADE2", image: "images/Ane.png", css: "commune" },
    { id: "chauve_souris", name: "Chauve-souris", rarity: "Commune", chance: 5.85, color: "#5DADE2", image: "images/chauve souris.png", css: "commune" },
    { id: "cheval", name: "Cheval", rarity: "Commune", chance: 5.85, color: "#5DADE2", image: "images/Cheval.png", css: "commune" },
    { id: "cochon", name: "Cochon", rarity: "Commune", chance: 5.85, color: "#5DADE2", image: "images/cochon.png", css: "commune" },
    { id: "lapin", name: "Lapin", rarity: "Commune", chance: 5.85, color: "#5DADE2", image: "images/Lapin.png", css: "commune" },
    { id: "mouton", name: "Mouton", rarity: "Commune", chance: 5.85, color: "#5DADE2", image: "images/Mouton.png", css: "commune" },
    { id: "perroquet", name: "Perroquet", rarity: "Commune", chance: 5.85, color: "#5DADE2", image: "images/Perroquet.png", css: "commune" },
    { id: "poule", name: "Poule", rarity: "Commune", chance: 5.85, color: "#5DADE2", image: "images/poule.png", css: "commune" },
    { id: "poisson_tropical", name: "Poisson Tropical", rarity: "Commune", chance: 5.85, color: "#5DADE2", image: "images/TropicalFish.png", css: "commune" },
];

const RARITIES = [
    { name: "Commune", css: "commune", color: "#5DADE2", totalChance: "58.5%" },
    { name: "Rare", css: "rare", color: "#27AE60", totalChance: "25.0%" },
    { name: "Épique", css: "epique", color: "#8E44AD", totalChance: "14.4%" },
    { name: "Légendaire", css: "legendaire", color: "#E07B00", totalChance: "2.0%" },
    { name: "Mythique", css: "mythique", color: "#2D0057", totalChance: "0.1%" },
];

function renderCards(filter = 'all') {
    const container = document.getElementById('cards-container');
    container.innerHTML = '';

    const rarities = filter === 'all' ? RARITIES : RARITIES.filter(r => r.css === filter);

    rarities.forEach(rarity => {
        const cards = CARDS.filter(c => c.css === rarity.css);
        const section = document.createElement('div');
        section.className = 'rarity-section';
        section.innerHTML = `
            <div class="rarity-header">
                <div class="rarity-badge" style="background: ${rarity.color}; box-shadow: 0 0 10px ${rarity.color}"></div>
                <h2>${rarity.name}</h2>
                <span class="rarity-info">${cards.length} cartes &bull; ${rarity.totalChance} de drop</span>
            </div>
            <div class="cards-grid">
                ${cards.map(card => `
                    <div class="card ${card.css}" onclick="openModal('${card.id}')">
                        <img class="card-image" src="${card.image}" alt="${card.name}" loading="lazy">
                        <div class="card-info">
                            <div class="card-name">${card.name}</div>
                            <div class="card-rarity">${card.rarity}</div>
                            <div class="card-chance">${card.chance.toFixed(2)}% par carte</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        container.appendChild(section);
    });
}

function filterCards(filter) {
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderCards(filter);
}

function openModal(cardId) {
    const card = CARDS.find(c => c.id === cardId);
    if (!card) return;
    document.getElementById('modal-img').src = card.image;
    document.getElementById('modal-name').textContent = card.name;
    document.getElementById('modal-rarity').textContent = card.rarity;
    document.getElementById('modal-rarity').style.color = card.color;
    document.getElementById('modal-chance').textContent = card.chance.toFixed(2) + '% de chance de drop';
    document.getElementById('modal').classList.add('active');
}

function closeModal(e) {
    if (e.target === document.getElementById('modal') || e.target.classList.contains('modal-close')) {
        document.getElementById('modal').classList.remove('active');
    }
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('modal').classList.remove('active');
});

renderCards();
</script>

</body>
</html>
